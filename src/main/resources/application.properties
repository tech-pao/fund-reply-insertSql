spring.application.name=fund-reply-insertSql
spring.datasource.url=jdbc:mysql://localhost:3306/fundreply?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=fundreply

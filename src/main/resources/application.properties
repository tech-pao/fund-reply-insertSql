spring.application.name=fund-reply-insertSql
spring.datasource.url=jdbc:mysql://homeserver:3306/fundreply?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=fundreply
spring.datasource.password=fundreply
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# Oracle 内网切换示例
# 使用时：把上面的 MySQL 配置注释掉，再取消下面 Oracle 配置的注释
# -----------------------------------------
# spring.datasource.url=jdbc:oracle:thin:@//<ORACLE_HOST>:1521/<SERVICE_NAME>
# spring.datasource.username=<ORACLE_USERNAME>
# spring.datasource.password=<ORACLE_PASSWORD>
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# =========================================

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=org.example.fund_reply_insertSql.entity
mybatis-plus.configuration.map-underscore-to-camel-case=false
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

autocoll.import.threads=8
autocoll.import.max-records-per-file=5000
